build:
  gpu: true
  cuda: "12.4"
  python_version: "3.12"
  python_requirements: "requirements.txt"
  run:
    - curl -o /usr/local/bin/pget -L "https://github.com/replicate/pget/releases/latest/download/pget_$(uname -s)_$(uname -m)" && chmod +x /usr/local/bin/pget
    - (git clone https://github.com/ndreca/Hunyuan3D-2 /tmp/repo) && (cd /tmp/repo/hy3dgen/texgen/custom_rasterizer && export TORCH_CUDA_ARCH_LIST="7.5;8.0;8.6;8.9;9.0;9.0+PTX" && python3 setup.py install) && (cd /tmp/repo/hy3dgen/texgen/differentiable_renderer && export TORCH_CUDA_ARCH_LIST="7.5;8.0;8.6;8.9;9.0;9.0+PTX" && python3 setup.py install) && (rm -rf /tmp/repo)
    - export TORCH_CUDA_ARCH_LIST="7.5;8.0;8.6;8.9;9.0;9.0+PTX" && export CUDA_HOME=/usr/local/cuda-12.4 && export NVCC_FLAGS="-O3" && export FORCE_CUDA=1 && pip install diso
    - pip install meshlib

predict: "predict.py:Predictor"
